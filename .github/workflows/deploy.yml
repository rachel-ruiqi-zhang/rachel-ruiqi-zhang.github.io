name: Deploy Quartz site to GitHub Pages

on:
  push:              # 任何分支推送都触发，避免漏触发
  workflow_dispatch: # 也可在 Actions 页面手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20     # LTS，CI 更稳
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build Quartz
        run: npx -y quartz@latest build   # 关键：改成 npx -y quartz@latest
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

